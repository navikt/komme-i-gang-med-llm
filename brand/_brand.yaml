logo:
  medium: NAV_logo_digital_White.svg

meta:
  name:
    full: Arbeids- og velferdsetaten
    short: Nav
  link:
    home: https://www.nav.no
    github: https://github.com/navikt
  description: |
    Navs samfunnsoppdrag er å bidra til sosial og økonomisk tryggleik og fremme
    overgang til arbeid og aktivitet. Målet er å skape eit inkluderande samfunn,
    eit inkluderande arbeidsliv og ein velfungerande arbeidsmarknad.
  founded: 2006

typography:
  fonts:
    - family: Source Sans 3
      source: google
      weight: [400, 800]
      style: normal

color:
  palette:
    brand-beige-600: "#ad634a"
    brand-beige-dark-600: "#ab705b"
    brand-blue-600: "#457c9d"
    brand-blue-dark-600: "#5b839c"
    brand-magenta-600: "#b65681"
    brand-magenta-dark-700: "#be7f99"
    brand-magenta-dark-800: "#c58aa2"
    danger-600: "#e22948"
    danger-dark-600: "#de4a50"
    info-600: "#457c9d"
    info-dark-600: "#5b839c"
    success-600: "#00893c"
    success-dark-600: "#378f53"
    warning-600: "#ca5000"
    warning-dark-600: "#c56333"

  foreground:
    light: "#202733"
    dark: "#dfe1e5"
  background:
    light: "#ffffff"
    dark: "#0e151f"
  primary:
    light: brand-magenta-600
    dark: brand-magenta-dark-700
  secondary:
    light: brand-blue-600
    dark: brand-blue-dark-600
  tertiary:
    light: brand-beige-600
    dark: brand-beige-dark-600
  success:
    light: success-600
    dark: success-dark-600
  info:
    light: info-600
    dark: info-dark-600
  warning:
    light: warning-600
    dark: warning-dark-600
  danger:
    light: danger-600
    dark: danger-dark-600
  light: "#ffffff"
  dark: "#49515e"
  link:
    light: brand-magenta-600
    dark: brand-magenta-dark-800
